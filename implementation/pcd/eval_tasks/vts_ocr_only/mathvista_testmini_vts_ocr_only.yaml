dataset_path: YongxinWang/math-prompt-in-image
dataset_name: mathvista_testmini_prompt_in_image
dataset_kwargs: {}
task: "mathvista_testmini_vts_ocr_only"
test_split: testmini
tag: visual_reasoning_collection
output_type: generate_until
doc_to_visual: !function utils.mathvista_doc_to_visual_ocr_only
doc_to_text: !function utils.mathvista_doc_to_text_ocr_only
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 16384
process_results: !function utils.mathvista_process_results
metric_list:
  - metric: llm_as_judge_eval
    aggregation: !function utils.mathvista_aggregate_results
    higher_is_better: true
lmms_eval_specific_kwargs:
  default:
    shot_type: "step-by-step"
    shot: 0
    use_caption: False
    use_ocr: False
